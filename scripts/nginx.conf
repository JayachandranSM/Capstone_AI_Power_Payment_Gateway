events { worker_connections 1024; }

http {
    upstream core_api   { server core-api:8000; }
    upstream ai_service { server ai-service:8001; }
    upstream frontend   { server frontend:80; }

    # Rate limit zones — scoped to login and AI endpoints only
    # 10MB shared memory, keyed by client IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=30r/m;
    limit_req_status 429;

    server {
        listen 80;

        # Rate-limited login endpoint — 5 requests/min per IP, burst 3
        location /api/v1/auth/login {
            limit_req           zone=login_limit burst=3 nodelay;
            proxy_pass          http://core_api;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_read_timeout  30s;
        }

        location /api/v1 {
            proxy_pass         http://core_api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location /api/ai/ {
            limit_req           zone=ai_limit burst=10 nodelay;
            proxy_pass          http://ai_service/api/ai/;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_read_timeout  120s;
        }

        location /api/ai {
            limit_req           zone=ai_limit burst=10 nodelay;
            proxy_pass          http://ai_service;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_read_timeout  120s;
        }

        location ~ ^/(health|docs|redoc|openapi.json) {
            proxy_pass         http://core_api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
        }
    }
}
